- id: agentai.hardcoded-secret.literal
  message: Hardcoded secret-like literal detected. Move the value to env or secrets boundary.
  severity: ERROR
  languages: [ts, js]
  paths:
    include:
      - /src/**/*.ts
  patterns:
    - pattern-either:
        - pattern: $KEY = "sk-..."
        - pattern: $KEY = 'sk-...'
        - pattern: $KEY = "Bearer ..."
        - pattern: $KEY = 'Bearer ...'
    - metavariable-regex:
        metavariable: $KEY
        regex: (?i).*(api[_-]?key|token|secret|password|authorization).*
