<!-- apps/swabble/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swabble | AI Voice Assistant</title>
  <link rel="stylesheet" href="./src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <h1 style="font-family: 'Outfit', sans-serif;">Swabble</h1>
      <div class="status-indicator">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Disconnected</span>
      </div>
    </header>

    <main id="chat-history">
      <div class="message assistant">Hello! I'm Swabble. Tap the mic to talk or type below.</div>
    </main>

    <div class="voice-controls">
      <div id="waveforms" class="waveforms">
        <div class="bar" style="animation-delay: -0.9s"></div>
        <div class="bar" style="animation-delay: -0.6s"></div>
        <div class="bar" style="animation-delay: -0.3s"></div>
        <div class="bar" style="animation-delay: 0s"></div>
        <div class="bar" style="animation-delay: -0.3s"></div>
        <div class="bar" style="animation-delay: -0.6s"></div>
        <div class="bar" style="animation-delay: -0.9s"></div>
      </div>

      <button id="mic-btn" aria-label="Microphone">
        <svg id="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>

      <input type="text" id="fallback-input" placeholder="Type a message..." autocomplete="off">
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
